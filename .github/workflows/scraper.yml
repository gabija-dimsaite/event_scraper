name: Weekly Events Scraper

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

# 🔒 Prevent overlapping runs
concurrency:
  group: weekly-events-scraper
  cancel-in-progress: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------
      # Checkout repository
      # -----------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # -----------------------
      # Setup Python
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------
      # Install dependencies
      # -----------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------
      # Install Playwright
      # -----------------------
      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps

      # -----------------------
      # Run scraper
      # -----------------------
      - name: Run scraper
        run: |
          python scrape_events.py

      # -----------------------
      # Debug: show output files
      # -----------------------
      - name: Show output files (debug)
        run: |
          echo "Repo root:"
          ls -la
          echo "Output folder:"
          ls -la output || echo "No output directory"
          echo "All CSV files:"
          find . -name "*.csv" -maxdepth 3

      # -----------------------
      # Commit & Push CSV updates
      # -----------------------
      - name: Commit CSV outputs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 🔥 Always sync first to avoid non-fast-forward
          git pull --rebase origin main

          # Stage CSV files
          git add output/*.csv || true

          # If nothing changed, exit cleanly
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi

          git commit -m "Update CSV outputs"
          git push origin main
